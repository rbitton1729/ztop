stages:
  - test
  - build
  - upload
  - release
  - publish

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
  PACKAGE_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/zftop"

cache:
  key: ${CI_COMMIT_REF_SLUG}-${CI_JOB_NAME}
  paths:
    - .cargo/registry
    - .cargo/git
    - target/

test:
  stage: test
  image: rust:latest
  before_script:
    - curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C /usr/local/bin
  script:
    - cargo nextest run --profile ci
  artifacts:
    when: always
    reports:
      junit: target/nextest/ci/junit.xml

build:x86_64:
  stage: build
  image: rust:1-bullseye
  variables:
    TARGET: x86_64-unknown-linux-gnu
  script:
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        VERSION="${CI_COMMIT_TAG#v}"
        sed -i "s/^version = .*/version = \"${VERSION}\"/" Cargo.toml
      fi
    - cargo build --release --target ${TARGET}
    - strip target/${TARGET}/release/zftop
    - cp target/${TARGET}/release/zftop zftop-linux-amd64
    - sha256sum zftop-linux-amd64 | cut -d' ' -f1 > zftop-linux-amd64.sha256
  artifacts:
    paths:
      - zftop-linux-amd64
      - zftop-linux-amd64.sha256

build:aarch64:
  stage: build
  image: rust:1-bullseye
  variables:
    TARGET: aarch64-unknown-linux-gnu
    # Cross-compile linker. The cross toolchain is installed in before_script
    # below; setting this env var tells cargo to invoke it as the linker for
    # the aarch64 target instead of the default `cc` (which is amd64 on the
    # host).
    CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
  before_script:
    # `rust:1-bullseye` is a Debian 11 image with the host (amd64) Rust
    # toolchain pre-installed but no cross toolchain and no aarch64 std.
    # We need three things:
    #   - gcc-aarch64-linux-gnu       — the cross compiler/linker driver and
    #                                   aarch64-linux-gnu-strip used below.
    #   - libc6-dev-arm64-cross       — aarch64 glibc startup objects
    #                                   (Scrt1.o, crti.o, crtn.o) and headers.
    #                                   Without these, ld fails with
    #                                   "cannot find Scrt1.o" — the cross gcc
    #                                   package alone does NOT pull them in.
    #   - rustup target add aarch64…  — the aarch64 Rust std library.
    - apt-get update
    - apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu libc6-dev-arm64-cross
    - rustup target add ${TARGET}
  script:
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        VERSION="${CI_COMMIT_TAG#v}"
        sed -i "s/^version = .*/version = \"${VERSION}\"/" Cargo.toml
      fi
    - cargo build --release --target ${TARGET}
    - aarch64-linux-gnu-strip target/${TARGET}/release/zftop
    - cp target/${TARGET}/release/zftop zftop-linux-arm64
    - sha256sum zftop-linux-arm64 | cut -d' ' -f1 > zftop-linux-arm64.sha256
  artifacts:
    paths:
      - zftop-linux-arm64
      - zftop-linux-arm64.sha256

# FreeBSD build runs on a long-lived FreeBSD VM (bsd-1, 10.10.10.109) on the
# same internal vlan as the GitLab runner. The runner SSHes in as the
# gitlab-ci user, pipes scripts/bsd-build.sh to the remote shell, and SCPs
# the resulting binary back. The VM is set up by scripts/setup-bsd-ci.sh
# (run once, by hand). Runs on every push like the Linux build jobs — the
# downstream upload/release/aur jobs are still tag-gated, so non-tag builds
# just produce a CI artifact and don't publish anywhere.
build:freebsd:
  stage: build
  image: alpine:latest
  cache: []
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - cp "$BSD_SSH_PRIVATE_KEY" ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    # Pin the bsd-1 host key so a man-in-the-middle on the vlan can't
    # masquerade as the build host. The key was captured at setup time
    # via `ssh-keyscan -t ed25519 10.10.10.109`.
    - echo "10.10.10.109 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAICrhVIFj+H8gZT/VfhTB6OFKN4gflNiH05OpfWH/+8AQ" >> ~/.ssh/known_hosts
  script:
    # REF is the commit SHA the CI is building (always set).
    # VERSION is the tag without the v prefix (empty string on non-tag builds,
    # in which case bsd-build.sh skips the Cargo.toml version stamp).
    - REF="${CI_COMMIT_SHA}"
    - VERSION="${CI_COMMIT_TAG#v}"
    - ssh gitlab-ci@10.10.10.109 "REF='${REF}' VERSION='${VERSION}' sh -s" < scripts/bsd-build.sh
    - scp gitlab-ci@10.10.10.109:zftop/target/release/zftop zftop-freebsd-amd64
    - sha256sum zftop-freebsd-amd64 | cut -d' ' -f1 > zftop-freebsd-amd64.sha256
  artifacts:
    paths:
      - zftop-freebsd-amd64
      - zftop-freebsd-amd64.sha256

upload:
  stage: upload
  image: curlimages/curl:latest
  needs:
    - job: build:x86_64
      artifacts: true
    - job: build:aarch64
      artifacts: true
    - job: build:freebsd
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  script:
    - VERSION="${CI_COMMIT_TAG#v}"
    # Export VERSION as a dotenv artifact so the release: job sees it as a
    # GitLab CI variable. Required because the release: block can't run bash
    # modifiers like ${CI_COMMIT_TAG#v} — it's processed by GitLab's variable
    # expander, which only does plain $VAR substitution. Without this, every
    # asset link's URL ends up with an empty version segment and 404s.
    - echo "VERSION=${VERSION}" > version.env
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file zftop-linux-amd64 \
           "${PACKAGE_URL}/${VERSION}/zftop-linux-amd64"
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file zftop-linux-amd64.sha256 \
           "${PACKAGE_URL}/${VERSION}/zftop-linux-amd64.sha256"
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file zftop-linux-arm64 \
           "${PACKAGE_URL}/${VERSION}/zftop-linux-arm64"
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file zftop-linux-arm64.sha256 \
           "${PACKAGE_URL}/${VERSION}/zftop-linux-arm64.sha256"
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file zftop-freebsd-amd64 \
           "${PACKAGE_URL}/${VERSION}/zftop-freebsd-amd64"
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file zftop-freebsd-amd64.sha256 \
           "${PACKAGE_URL}/${VERSION}/zftop-freebsd-amd64.sha256"
  artifacts:
    reports:
      dotenv: version.env

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build:x86_64
      artifacts: true
    - job: build:aarch64
      artifacts: true
    - job: build:freebsd
      artifacts: true
    - job: upload
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  script:
    - AMD64_SHA256=$(cat zftop-linux-amd64.sha256)
    - ARM64_SHA256=$(cat zftop-linux-arm64.sha256)
    - FREEBSD_SHA256=$(cat zftop-freebsd-amd64.sha256)
    - VERSION="${CI_COMMIT_TAG#v}"
    - echo "## Checksums" > description.md
    - echo "" >> description.md
    - echo "| File | SHA256 |" >> description.md
    - echo "|------|--------|" >> description.md
    - echo "| zftop-linux-amd64 | \`${AMD64_SHA256}\` |" >> description.md
    - echo "| zftop-linux-arm64 | \`${ARM64_SHA256}\` |" >> description.md
    - echo "| zftop-freebsd-amd64 | \`${FREEBSD_SHA256}\` |" >> description.md
  release:
    # ${VERSION} below is the v-prefix-stripped tag, sourced from the dotenv
    # artifact exported by the upload job. We can't use ${CI_COMMIT_TAG#v}
    # here because GitLab's release: block processes variables with its own
    # expander, which doesn't support bash modifiers — it'd silently expand
    # to an empty string and produce 404 download links.
    tag_name: ${CI_COMMIT_TAG}
    name: "zftop ${CI_COMMIT_TAG}"
    description: ./description.md
    assets:
      links:
        - name: zftop-linux-amd64
          url: "${PACKAGE_URL}/${VERSION}/zftop-linux-amd64"
          filepath: /zftop-linux-amd64
          link_type: package
        - name: zftop-linux-arm64
          url: "${PACKAGE_URL}/${VERSION}/zftop-linux-arm64"
          filepath: /zftop-linux-arm64
          link_type: package
        - name: zftop-freebsd-amd64
          url: "${PACKAGE_URL}/${VERSION}/zftop-freebsd-amd64"
          filepath: /zftop-freebsd-amd64
          link_type: package

aur:
  stage: publish
  image: archlinux:latest
  needs:
    - job: build:x86_64
      artifacts: true
    - job: upload
  rules:
    # Only push to AUR on stable semver tags, not pre-release / rc tags.
    # Lets you tag v0.1.0-rc1 to dry-run the rest of the pipeline without
    # leaking a junk version to AUR users.
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/
  script:
    - pacman -Sy --noconfirm openssh git curl
    - mkdir -p ~/.ssh
    # Same SSH key as build:freebsd — the public half is registered both on
    # bsd-1's gitlab-ci user and on the AUR account. AUR auth is per-user
    # (not per-package), so one key gets us push access to every package on
    # the rbitton AUR account.
    - cp "$BSD_SSH_PRIVATE_KEY" ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - echo "aur.archlinux.org ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEuBKrPzbawxA/k2g6NcyV5jmqwJ2s+zpgZGZ7tpLIcN" >> ~/.ssh/known_hosts
    - git config --global user.name "Raphael Bitton"
    - git config --global user.email "$AUR_EMAIL"
    - VERSION="${CI_COMMIT_TAG#v}"
    # Use the same hash from the build
    - BINARY_SHA256=$(cat "${CI_PROJECT_DIR}/zftop-linux-amd64.sha256")
    - LICENSE_SHA256=$(curl -sL "https://git.skylantix.com/rbitton/zftop/-/raw/v${VERSION}/LICENSE" | sha256sum | cut -d' ' -f1)
    # Clone AUR and update PKGBUILD
    - git clone ssh://aur@aur.archlinux.org/zftop.git aur-repo
    - cd aur-repo
    - cp "${CI_PROJECT_DIR}/aur/PKGBUILD" .
    - sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
    - sed -i "s/^sha256sums=.*/sha256sums=('${BINARY_SHA256}' '${LICENSE_SHA256}')/" PKGBUILD
    # Generate .SRCINFO (makepkg needs non-root)
    - useradd -m builder
    - chown -R builder:builder .
    - su builder -c "makepkg --printsrcinfo > .SRCINFO"
    - chown -R root:root .
    - git add PKGBUILD .SRCINFO
    - git commit -m "Update to ${VERSION}"
    - git push

# Publish to crates.io. Same trigger gate as the AUR job: stable semver tags
# only, so a v0.1.0-rc1 dry-run tag won't burn a real version on crates.io
# (cargo publish is permanent — you can yank a version but not delete it).
crates_io:
  stage: publish
  image: rust:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]+\.[0-9]+\.[0-9]+$/
  cache: []
  variables:
    # CARGO_REGISTRY_TOKEN comes from the project-level CI variable (Settings →
    # CI/CD → Variables). The project-level variable MUST have "Expand variable
    # reference" enabled (raw=false / EXPANDED=true) so the $CARGO_REGISTRY_TOKEN
    # below actually expands to the real value. With raw=true the expansion is
    # skipped and the literal string "$CARGO_REGISTRY_TOKEN" leaks through to
    # cargo, which then sends it as the token and crates.io rejects it as
    # "The given API token does not match the format used by crates.io".
    CARGO_REGISTRY_TOKEN: $CARGO_REGISTRY_TOKEN
  script:
    - VERSION="${CI_COMMIT_TAG#v}"
    # Stamp the real version into Cargo.toml the same way build:x86_64 does.
    - sed -i "s/^version = .*/version = \"${VERSION}\"/" Cargo.toml
    # --no-verify skips the local rebuild that cargo publish does by default.
    # The build:* jobs already proved the code compiles on every target we
    # care about, and we don't want to wait through another full build here.
    # --allow-dirty is required because we just sed-stamped Cargo.toml above,
    # which leaves the working tree "dirty" from cargo's perspective (the
    # tagged commit on disk doesn't match the in-tree version we're publishing).
    - cargo publish --no-verify --allow-dirty

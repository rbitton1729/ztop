stages:
  - test
  - build
  - upload
  - release
  - publish

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
  TARGET: x86_64-unknown-linux-gnu
  PACKAGE_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/ztop"

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .cargo/registry
    - .cargo/git
    - target/

test:
  stage: test
  image: rust:latest
  before_script:
    - curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C /usr/local/bin
  script:
    - cargo nextest run --profile ci
  artifacts:
    when: always
    reports:
      junit: target/nextest/ci/junit.xml

build:
  stage: build
  image: rust:latest
  script:
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        VERSION="${CI_COMMIT_TAG#v}"
        sed -i "s/^version = .*/version = \"${VERSION}\"/" Cargo.toml
      fi
    - cargo build --release --target ${TARGET}
    - strip target/${TARGET}/release/ztop
    - cp target/${TARGET}/release/ztop ztop-linux-amd64
    - sha256sum ztop-linux-amd64 | cut -d' ' -f1 > ztop-linux-amd64.sha256
  artifacts:
    paths:
      - ztop-linux-amd64
      - ztop-linux-amd64.sha256

upload:
  stage: upload
  image: curlimages/curl:latest
  needs:
    - job: build
      artifacts: true
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  script:
    - VERSION="${CI_COMMIT_TAG#v}"
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file ztop-linux-amd64 \
           "${PACKAGE_URL}/${VERSION}/ztop-linux-amd64"
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file ztop-linux-amd64.sha256 \
           "${PACKAGE_URL}/${VERSION}/ztop-linux-amd64.sha256"

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build
      artifacts: true
    - job: upload
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  script:
    - BINARY_SHA256=$(cat ztop-linux-amd64.sha256)
    - VERSION="${CI_COMMIT_TAG#v}"
    - echo "## Checksums" > description.md
    - echo "" >> description.md
    - echo "| File | SHA256 |" >> description.md
    - echo "|------|--------|" >> description.md
    - echo "| ztop-linux-amd64 | \`${BINARY_SHA256}\` |" >> description.md
  release:
    tag_name: ${CI_COMMIT_TAG}
    name: "ztop ${CI_COMMIT_TAG}"
    description: ./description.md
    assets:
      links:
        - name: ztop-linux-amd64
          url: "${PACKAGE_URL}/${CI_COMMIT_TAG#v}/ztop-linux-amd64"
          filepath: /ztop-linux-amd64

aur:
  stage: publish
  image: archlinux:latest
  needs:
    - job: build
      artifacts: true
    - job: upload
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  script:
    - pacman -Sy --noconfirm openssh git curl
    - mkdir -p ~/.ssh
    - cp "$AUR_SSH_PRIVATE_KEY" ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - echo "aur.archlinux.org ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEuBKrPzbawxA/k2g6NcyV5jmqwJ2s+zpgZGZ7tpLIcN" >> ~/.ssh/known_hosts
    - git config --global user.name "Raphael Bitton"
    - git config --global user.email "$AUR_EMAIL"
    - VERSION="${CI_COMMIT_TAG#v}"
    # Use the same hash from the build
    - BINARY_SHA256=$(cat "${CI_PROJECT_DIR}/ztop-linux-amd64.sha256")
    - LICENCE_SHA256=$(curl -sL "https://git.skylantix.com/rbitton/ztop/-/raw/v${VERSION}/LICENCE" | sha256sum | cut -d' ' -f1)
    # Clone AUR and update PKGBUILD
    - git clone ssh://aur@aur.archlinux.org/zfstop.git aur-repo
    - cd aur-repo
    - cp "${CI_PROJECT_DIR}/aur/PKGBUILD" .
    - sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
    - sed -i "s/^sha256sums=.*/sha256sums=('${BINARY_SHA256}' '${LICENCE_SHA256}')/" PKGBUILD
    # Generate .SRCINFO (makepkg needs non-root)
    - useradd -m builder
    - chown -R builder:builder .
    - su builder -c "makepkg --printsrcinfo > .SRCINFO"
    - chown -R root:root .
    - git add PKGBUILD .SRCINFO
    - git commit -m "Update to ${VERSION}"
    - git push
